<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetTube</title>
    <!-- Premium Cinematic / Apple UI Typography Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@300;400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Apple Glassmorphism Utility Class */
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(35px) saturate(210%);
            -webkit-backdrop-filter: blur(35px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Apple Glass Pill Overlay Style for Interactive Buttons */
        .apple-glass-btn {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #ffffff;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15), 0 4px 15px rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s cubic-bezier(0.25, 1, 0.5, 1), 
                        border-color 0.3s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.2s ease, 
                        box-shadow 0.3s ease;
        }

        .apple-glass-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 6px 20px rgba(255, 255, 255, 0.05);
        }

        /* Transparent Top Navigation Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 4%;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }

        /* NetTube Logo Text with Electric Cyan Theme */
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.9rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        /* ==========================================
           APPLE GLASS SEGMENTED CONTROLLER (TABS)
           ========================================== */
        .tab-container {
            position: relative;
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .tab-btn {
            position: relative;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            padding: 8px 24px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            z-index: 2;
            transition: color 0.30s cubic-bezier(0.25, 1, 0.5, 1);
            font-family: 'Inter', sans-serif;
        }

        .tab-btn.active {
            color: #ffffff;
            font-weight: 600;
        }

        /* Animated Sliding Glass Capsule Backdrop */
        .active-pill {
            position: absolute;
            top: 4px;
            left: 4px;
            height: calc(100% - 8px);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 4px 12px rgba(0,0,0,0.25);
            border-radius: 9px;
            z-index: 1;
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), width 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }

        /* Full Edge-to-Edge Billboard Hero Banner Section */
        .billboard-container {
            position: relative;
            width: 100%;
            height: 75vh;
            min-height: 550px;
            background-size: cover;
            background-position: center 20%;
            background-repeat: no-repeat;
            display: flex;
            align-items: flex-end;
            transition: background-image 0.5s ease;
        }

        /* Netflix-style Vignette Shading to fade into dark library */
        .billboard-vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(75deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0) 100%),
                        linear-gradient(to top, #000000 0%, rgba(0,0,0,0) 25%);
            z-index: 1;
        }

        .billboard-content {
            position: relative;
            z-index: 2;
            padding: 0 4% 60px 4%;
            max-width: 800px;
        }

        /* Large Brand Emblem Layout inside Billboard Panel */
        .billboard-logo-img {
            max-width: 380px;
            width: 100%;
            height: auto;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.5));
            display: none;
        }

        /* Default Ice Cool Title text layout */
        .billboard-content h1 {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 3.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #ffffff 30%, #a1c4fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
        }

        /* Custom Class for GOAT Electric Ice Blue Title Header */
        .billboard-content h1.blue-goat-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.2rem;
            font-weight: 900;
            background: linear-gradient(180deg, #00ffff 0%, #0088ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 136, 255, 0.6)) drop-shadow(0 4px 10px rgba(0,0,0,0.8));
            letter-spacing: 2px;
        }

        /* Custom Class for Mortal Kombat Fiery Orange Title Header */
        .billboard-content h1.fiery-orange-title {
            background: linear-gradient(180deg, #ff9900 0%, #ff3300 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(255, 67, 0, 0.6)) drop-shadow(0 4px 12px rgba(0,0,0,0.7));
        }

        /* Custom Class for Michael Jackson Premium Regal Golden Title Header */
        .billboard-content h1.regal-gold-title {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(180deg, #ffe066 0%, #f5af19 50%, #e65c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(245, 175, 25, 0.5)) drop-shadow(0 4px 15px rgba(0,0,0,0.9));
        }

        .billboard-content p {
            color: rgba(210, 225, 245, 0.85);
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 300;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        /* Integrated Apple Glass Play Button Layout */
        .btn-play {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Unique Hover Glow Themes Over Apple Glass Foundation */
        .btn-play.fiery-glow:hover {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 0 25px rgba(255, 67, 0, 0.5);
            border-color: rgba(255, 67, 0, 0.4);
            background: rgba(255, 67, 0, 0.15);
        }

        .btn-play.neon-blue-glow:hover {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 0 25px rgba(0, 242, 254, 0.5);
            border-color: rgba(0, 242, 254, 0.4);
            background: rgba(0, 242, 254, 0.15);
        }

        .btn-play.squid-magenta-glow:hover {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 0 25px rgba(255, 10, 140, 0.6);
            border-color: rgba(255, 10, 140, 0.5);
            background: rgba(255, 10, 140, 0.15);
        }

        /* Custom style for Coming Soon button state */
        .btn-play.coming-soon-btn {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: none;
            cursor: default;
        }
        .btn-play.coming-soon-btn:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: none;
            box-shadow: none;
            border-color: rgba(255, 255, 255, 0.05);
        }

        /* Movie Selection Shelf */
        .shelf {
            padding: 40px 4% 60px 4%;
            background-color: #000000;
            position: relative;
            z-index: 5;
        }

        .shelf h2 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: rgba(220, 235, 255, 0.95);
            letter-spacing: -0.3px;
        }

        /* Grid View Layout with crossfade smooth transitions */
        .library-content-view {
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 1;
            transform: translateY(0);
        }

        .library-content-view.fade-out {
            opacity: 0;
            transform: translateY(10px);
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }

        .movie-card {
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease, border-color 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .movie-card:hover {
            transform: scale(1.04);
            box-shadow: 0 20px 40px rgba(0, 242, 254, 0.15);
            border-color: rgba(0, 242, 254, 0.3);
        }

        .movie-card.squid-hover:hover {
            box-shadow: 0 20px 40px rgba(255, 10, 140, 0.25);
            border-color: rgba(255, 10, 140, 0.4);
        }

        /* Distinct gold flare outline for the Michael Jackson portrait card */
        .movie-card.gold-flare-hover:hover {
            box-shadow: 0 20px 40px rgba(245, 175, 25, 0.25);
            border-color: rgba(245, 175, 25, 0.4);
        }

        .poster-container {
            position: relative;
            width: 100%;
            height: 360px;
            overflow: hidden;
            background-color: #111;
        }

        .movie-card img.poster-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .movie-card:hover img.poster-art {
            transform: scale(1.05);
        }

        .movie-card .card-logo-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-height: 80px;
            object-fit: contain;
            filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.9));
        }

        /* Badge graphic label overlays */
        .card-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 6px;
            letter-spacing: 0.5px;
            z-index: 3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .badge-gold {
            background: linear-gradient(135deg, #f5af19 0%, #e65c00 100%);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .badge-magenta {
            background: linear-gradient(135deg, #ff0a8c 0%, #a30050 100%);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .movie-card-title {
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: rgba(225, 240, 255, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Full Screen Immersive Detail Overlay Panel */
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(0, 4, 12, 0.96);
            z-index: 200;
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            overflow-y: auto;
        }

        .detail-modal {
            max-width: 1100px;
            margin: 50px auto;
            width: 90%;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.1);
        }

        .detail-modal.gold-modal-glow {
            box-shadow: 0 0 60px rgba(245, 175, 25, 0.15);
        }

        .detail-modal.squid-modal-glow {
            box-shadow: 0 0 60px rgba(255, 10, 140, 0.2);
        }

        /* Interactive Detail Player Framework */
        .modal-player-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .modal-player-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Custom image presentation for coming soon/unreleased elements inside media box */
        .modal-placeholder-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .modal-logo-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45%;
            max-height: 180px;
            object-fit: contain;
            z-index: 5;
            pointer-events: none;
            filter: drop-shadow(0px 10px 25px rgba(0, 0, 0, 0.95));
            transition: opacity 0.4s ease;
            display: none;
        }

        .modal-info {
            padding: 40px;
        }

        .modal-info h2 {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(180deg, #ffffff 30%, #c2ffd8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-season-tag {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff0a8c;
            margin-bottom: 20px;
            display: none;
        }

        /* Custom treatment specifically for Cold Tone text headers when active inside tab */
        .modal-info h2.cold-title {
            background: linear-gradient(180deg, #ffffff 20%, #a1c4fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Fiery Orange style fallback header for tab view */
        .modal-info h2.fiery-title {
            background: linear-gradient(180deg, #ff9900 0%, #ff3300 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Electric Blue style header for GOAT inside tab view */
        .modal-info h2.blue-title {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(180deg, #00ffff 0%, #0088ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Premium Gold style header for Michael Jackson movie view */
        .modal-info h2.gold-title {
            background: linear-gradient(180deg, #ffe066 0%, #f5af19 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-info p {
            color: rgba(215, 230, 250, 0.75);
            font-size: 1.1rem;
            line-height: 1.7;
            font-weight: 300;
            margin-bottom: 30px;
        }

        /* ==========================================
           EPISODES INTERACTIVE SELECTOR TRACK PANEL
           ========================================== */
        .episodes-section {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 30px;
            margin-top: 10px;
            display: none;
        }

        .episodes-section h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .episode-card {
            display: flex;
            flex-direction: column;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
        }

        .episode-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 10, 140, 0.4);
            transform: translateY(-2px);
        }

        .episode-card.active-episode {
            background: rgba(255, 10, 140, 0.12);
            border-color: rgba(255, 10, 140, 0.6);
        }

        .ep-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .ep-number {
            font-size: 0.8rem;
            font-weight: 700;
            color: #ff0a8c;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ep-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .ep-btn-play {
            margin-top: auto;
            width: 100%;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Overlay Interface Exit Control via Apple Glass Button Blueprint */
        .btn-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 210;
        }
    </style>
</head>
<body>

    <!-- Transparent Branding Bar with Integrated Tab Controller -->
    <header>
        <div class="logo">
            <span>NetTube</span>
        </div>

        <!-- Apple Glass Slider Switcher Frame -->
        <div class="tab-container">
            <div id="active-pill" class="active-pill"></div>
            <button id="tab-movies" class="tab-btn active" onclick="switchLibraryTab('movies')">Movies</button>
            <button id="tab-series" class="tab-btn" onclick="switchLibraryTab('series')">Series</button>
        </div>
        
        <div style="width: 140px; display: block;"></div>
    </header>

    <!-- Edge-to-Edge Hero Banner Container -->
    <section id="hero-billboard" class="billboard-container">
        <div class="billboard-vignette"></div>
        <div class="billboard-content">
            <img id="hero-logo-img" class="billboard-logo-img" src="" alt="Series Branding Logo">
            <h1 id="hero-title">Loading...</h1>
            <p id="hero-desc"></p>
            <button id="hero-play-btn" class="apple-glass-btn btn-play"></button>
        </div>
    </section>

    <!-- Content Track Grid Selection Section -->
    <section class="shelf">
        <h2 id="shelf-heading">Your Movies</h2>
        <div id="library-content-view" class="library-content-view">
            <div class="movie-grid" id="library-grid"></div>
        </div>
    </section>

    <!-- Immersive Modal Window Interface Panel -->
    <div id="detail-overlay" class="detail-overlay">
        <button class="apple-glass-btn btn-close" onclick="closeMovieTab()">✕</button>
        
        <div id="detail-modal-box" class="detail-modal glass-panel">
            <div class="modal-player-box">
                <!-- Inner Float Logo Layer -->
                <img id="modal-logo" class="modal-logo-overlay" src="" alt="Overlay Logo">
                
                <!-- Display Video Stream vs Image Graphic Placeholders independently -->
                <video id="tab-video-player" controls preload="metadata"></video>
                <img id="tab-image-placeholder" class="modal-placeholder-image" src="" alt="Coming Soon Artwork">
            </div>
            <div class="modal-info">
                <div id="modal-season-tag" class="modal-season-tag">Season 1</div>
                <h2 id="modal-title">Movie Title</h2>
                <p id="modal-desc">Movie description information blocks go here...</p>

                <!-- SERIES EPISODE SHELF COMPONENT PANEL -->
                <div id="modal-episodes-section" class="episodes-section">
                    <h3 id="episode-list-title">Episodes (Season 1)</h3>
                    <div id="episodes-grid" class="episodes-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- CENTRAL DATABASE AND ARCHITECTURE SCRIPT -->
    <script>
        let currentTabScope = 'movies';
        let currentActiveEpisodeIndex = 0;

        // ==========================================
        // CONTENT ENGINE SEPARATED INDEXES 
        // ==========================================
        const moviesDatabase = {
            'michael': {

                logoUrl: '',

                themeStyle: 'regal-gold',

            },
            'goat': {

                videoUrl: 'https://archive.org/download/goat-2026_202605/GOAT%20%282026%29.mp4',
                billboardPosterUrl: 'https://4kwallpapers.com/images/wallpapers/goat-2026-8k-movie-7680x4320-23667.png',
                libraryPosterUrl: 'https://image.tmdb.org/t/p/original/bkIVlnO1MnTS6jL6qP0Ki2H6O3.jpg',

            },
            'dm4': {
                title: 'Despicable Me 4',
                videoUrl: 'https://archive.org/download/mortal-kombat-bluray-1080p/Despicable%20Me%204.mp4',
                billboardPosterUrl: 'https://4kwallpapers.com/images/wallpapers/despicable-me-4-2560x1440-15031.jpg',
                libraryPosterUrl: 'https://m.media-amazon.com/images/M/MV5BODlhNjE1NjUtNjZiNi00MDBmLWJmYWEtNTEyZjEyYzg5MTcxXkEyXkFqcGc@._V1_.jpg',
                logoUrl: '', 
                description: 'Gru, Lucy, Margo, Edith, and Agnes welcome a new member to the family, Gru Jr., who is intent on tormenting his dad. Gru faces a new nemesis in Maxime Le Mal and his femme fatale girlfriend Valentina.',
                themeStyle: 'clean-poster',
                hideTextOnBillboard: true,
                isComingSoon: false
            },
            'mk1': {
                title: 'Mortal Kombat 1',
                videoUrl: 'https://archive.org/download/mortal-kombat-bluray-1080p/Mortal%20Kombat%20%282021%29.mp4',
                billboardPosterUrl: 'https://4kwallpapers.com/images/wallpapers/mortal-kombat-2021-movies-poster-4096x1895-4902.jpg',
                libraryPosterUrl: 'https://i.ebayimg.com/images/g/rocAAOSwojRgMJBx/s-l400.jpg',
                logoUrl: 'https://logos-world.net/wp-content/uploads/2020/11/Mortal-Kombat-Logo.png',
                description: 'MMA fighter Cole Young seeks out Earth\'s greatest champions in order to stand against the enemies of Outworld in a high stakes battle for the universe.',
                themeStyle: 'fiery-orange',
                hideTextOnBillboard: false,
                isComingSoon: false
            },
            'bfg': {
                title: 'The BFG',
                videoUrl: 'https://archive.org/download/index_20260516/The.BFG.2016.720p.WEBRip.x264.AAC-ETRG.mp4',
                billboardPosterUrl: 'https://wallpapers.com/images/hd/the-bfg-movie-alo8v739htwfsxit.jpg',
                libraryPosterUrl: 'https://m.media-amazon.com/images/I/71naZ-Kfl4L._AC_UF894,1000_QL80_.jpg',
                logoUrl: '', 
                description: 'An orphan girl named Sophie befriends a benevolent giant, dubbed the Big Friendly Giant, who delivers charming dreams to children.',
                themeStyle: 'cold-steel',
                hideTextOnBillboard: true,
                isComingSoon: false
            }
        };

        const seriesDatabase = {
            'squidgame': {
                title: 'Squid Game',
                isSeries: true,
                seasonLabel: 'Season 1',
                billboardPosterUrl: 'https://images.ctfassets.net/4cd45et68cgf/3BJQrujAXLeXXsWXnolmvB/28845a87ecb25a0609c2e9faec57736c/EN_SQdGame_Main_PlayGround_Horizontal_RGB_PRE.jpg?w=1200',
                libraryPosterUrl: 'https://wallpapercave.com/wp/wp15116736.webp',
                logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/5/57/Squid_Game_2021_vector_logo_english.svg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original', 
                description: 'Hundreds of cash-strapped players accept a strange invitation to compete in children\'s games. Inside, a tempting prize awaits with deadly high stakes. A survival game where only one walks away.',
                themeStyle: 'squid-magenta',
                hideTextOnBillboard: true,
                isComingSoon: false,
                episodes: [
                    { name: 'Red Light, Green Light', url: 'PASTE_EPISODE_1_URL_HERE' },
                    { name: 'Hell', url: 'PASTE_EPISODE_2_URL_HERE' },
                    { name: 'The Man with the Umbrella', url: 'PASTE_EPISODE_3_URL_HERE' },
                    { name: 'Stick to the Team', url: 'PASTE_EPISODE_4_URL_HERE' },
                    { name: 'A Fair World', url: 'PASTE_EPISODE_5_URL_HERE' },
                    { name: 'Gganbu', url: 'PASTE_EPISODE_6_URL_HERE' },
                    { name: 'VIPs', url: 'PASTE_EPISODE_7_URL_HERE' },
                    { name: 'Front Man', url: 'PASTE_EPISODE_8_URL_HERE' },
                    { name: 'One Lucky Day', url: 'PASTE_EPISODE_9_URL_HERE' }
                ]
            }
        };

        // UI Element Selectors
        const billboard = document.getElementById('hero-billboard');
        const heroTitle = document.getElementById('hero-title');
        const heroLogoImg = document.getElementById('hero-logo-img');
        const heroDesc = document.getElementById('hero-desc');
        const heroPlayBtn = document.getElementById('hero-play-btn');
        const libraryGrid = document.getElementById('library-grid');
        const shelfHeading = document.getElementById('shelf-heading');
        const contentContainerView = document.getElementById('library-content-view');
        
        // Pop-out Overlay Window System Selectors
        const detailOverlay = document.getElementById('detail-overlay');
        const detailModalBox = document.getElementById('detail-modal-box');
        const tabPlayer = document.getElementById('tab-video-player');
        const tabImagePlaceholder = document.getElementById('tab-image-placeholder');
        const modalLogo = document.getElementById('modal-logo');
        const modalTitle = document.getElementById('modal-title');
        const modalSeasonTag = document.getElementById('modal-season-tag');
        const modalDesc = document.getElementById('modal-desc');
        const modalEpisodesSection = document.getElementById('modal-episodes-section');
        const episodesGrid = document.getElementById('episodes-grid');

        // ==========================================
        // DYNAMIC BANNER SELECTION MECHANICS
        // ==========================================
        function setupBillboardBanner(id, scope) {
            const db = (scope === 'movies') ? moviesDatabase : seriesDatabase;
            const data = db[id];
            if (!data) return;

            billboard.style.backgroundImage = `url('${data.billboardPosterUrl}')`;
            
            // Clean styles reset
            heroTitle.className = '';
            heroPlayBtn.className = 'apple-glass-btn btn-play';
            heroLogoImg.style.display = 'none';
            heroLogoImg.src = '';

            // Handle custom text vs logo overlays on billboard banner
            if (data.hideTextOnBillboard && data.logoUrl) {
                heroTitle.style.display = 'none';
                heroLogoImg.src = data.logoUrl;
                heroLogoImg.style.display = 'block';
                heroDesc.style.display = 'none';
            } else if (data.hideTextOnBillboard) {
                heroTitle.style.display = 'none';
                heroDesc.style.display = 'none';
            } else {
                heroTitle.style.display = 'block';
                heroDesc.style.display = 'none';
                heroTitle.innerText = data.title;
            }

            // Inject premium button states
            if (data.isComingSoon) {
                heroPlayBtn.className = 'apple-glass-btn btn-play coming-soon-btn';
                heroPlayBtn.innerHTML = `Coming Soon`;
            } else {
                heroPlayBtn.innerHTML = `
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    ${data.isSeries ? 'View Episodes' : 'Play Content'}
                `;
            }

            // Apply specific accent color shadows
            if (data.themeStyle === 'fiery-orange') {
                heroTitle.className = 'fiery-orange-title';
                heroPlayBtn.classList.add('fiery-glow');
            } else if (data.themeStyle === 'electric-blue') {
                heroTitle.className = 'blue-goat-title';
                heroPlayBtn.classList.add('neon-blue-glow');
            } else if (data.themeStyle === 'regal-gold') {
                heroTitle.className = 'regal-gold-title';
            } else if (data.themeStyle === 'squid-magenta') {
                heroPlayBtn.classList.add('squid-magenta-glow');
            }
            
            heroPlayBtn.setAttribute('onclick', `openContentTab('${id}', '${scope}')`);
        }

        // ==========================================
        // DYNAMIC TRACK CARDS GRID RENDER ENGINE
        // ==========================================
        function buildGridUI(scope) {
            libraryGrid.innerHTML = '';
            const db = (scope === 'movies') ? moviesDatabase : seriesDatabase;
            
            Object.keys(db).forEach(id => {
                const item = db[id];
                const card = document.createElement('div');
                card.className = 'movie-card glass-panel';
                card.setAttribute('onclick', `openContentTab('${id}', '${scope}')`);

                // Apply unique grid visual styles based on target elements
                if (item.themeStyle === 'regal-gold') {
                    card.classList.add('gold-flare-hover');
                } else if (item.themeStyle === 'squid-magenta') {
                    card.classList.add('squid-hover');
                }

                let badgeHtml = '';
                if (item.isComingSoon) badgeHtml = `<div class="card-badge badge-gold">Soon</div>`;
                else if (item.isSeries) badgeHtml = `<div class="card-badge badge-magenta">${item.seasonLabel}</div>`;

                let logoHtml = item.logoUrl ? `<img class="card-logo-overlay" src="${item.logoUrl}" alt="${item.title} Branding Logo">` : '';

                card.innerHTML = `
                    <div class="poster-container">
                        ${badgeHtml}
                        <img class="poster-art" src="${item.libraryPosterUrl}" alt="${item.title} Poster Visual">
                        ${logoHtml}
                    </div>
                    <div class="movie-card-title">${item.title} ${item.isSeries ? `(${item.seasonLabel})` : ''}</div>
                `;
                libraryGrid.appendChild(card);
            });
        }

        // ==========================================
        // INTERACTIVE MAIN TAB CONTROLLER SWITCHER
        // ==========================================
        function switchLibraryTab(targetTab) {
            if (currentTabScope === targetTab) return;
            currentTabScope = targetTab;

            const btnMovies = document.getElementById('tab-movies');
            const btnSeries = document.getElementById('tab-series');
            const activePill = document.getElementById('active-pill');

            if (targetTab === 'movies') {
                btnMovies.classList.add('active');
                btnSeries.classList.remove('active');
                activePill.style.transform = 'translateX(0px)';
                activePill.style.width = `${btnMovies.offsetWidth}px`;
                shelfHeading.innerText = "Your Movies";
            } else {
                btnSeries.classList.add('active');
                btnMovies.classList.remove('active');
                activePill.style.transform = `translateX(${btnMovies.offsetWidth}px)`;
                activePill.style.width = `${btnSeries.offsetWidth}px`;
                shelfHeading.innerText = "Your Series";
            }

            contentContainerView.classList.add('fade-out');
            setTimeout(() => {
                buildGridUI(targetTab);
                
                const db = (targetTab === 'movies') ? moviesDatabase : seriesDatabase;
                const keys = Object.keys(db);
                setupBillboardBanner(keys[0], targetTab); // Autoload first database entity into banner slice

                contentContainerView.classList.remove('fade-out');
            }, 300);
        }

        function initTabPillPositions() {
            const activeBtn = document.querySelector('.tab-btn.active');
            const activePill = document.getElementById('active-pill');
            if (activeBtn && activePill) {
                activePill.style.width = `${activeBtn.offsetWidth}px`;
            }
        }

        // ==========================================
        // POP-OUT MODAL MAIN DISPLAY MECHANICS
        // ==========================================
        function openContentTab(id, scope) {
            const db = (scope === 'movies') ? moviesDatabase : seriesDatabase;
            const data = db[id];
            if (!data) return;

            // Deep visual variables cleanup loops
            tabPlayer.style.display = 'none';
            tabPlayer.src = '';
            tabImagePlaceholder.style.display = 'none';
            tabImagePlaceholder.src = '';
            modalLogo.style.display = 'none';
            modalLogo.src = '';
            modalSeasonTag.style.display = 'none';
            modalEpisodesSection.style.display = 'none';
            episodesGrid.innerHTML = '';
            detailModalBox.className = 'detail-modal glass-panel';

            modalTitle.style.display = 'block';
            modalTitle.innerText = data.title;
            modalDesc.innerText = data.description;

            // Handle standard item distribution routes
            if (data.isComingSoon) {
                tabImagePlaceholder.src = data.billboardPosterUrl;
                tabImagePlaceholder.style.display = 'block';
                detailModalBox.classList.add('gold-modal-glow');
            } else if (data.isSeries && data.episodes && data.episodes.length > 0) {
                // Configure specific settings for structural multi-episode streams
                detailModalBox.classList.add('squid-modal-glow');
                modalSeasonTag.innerText = data.seasonLabel;
                modalSeasonTag.style.display = 'block';
                modalEpisodesSection.style.display = 'block';
                
                // Automatically index first sequence block stream URL straight into main player canvas element
                currentActiveEpisodeIndex = 0;
                tabPlayer.src = data.episodes[0].url;
                tabPlayer.poster = data.billboardPosterUrl;
                tabPlayer.style.display = 'block';

                // Map all nested dynamic sub-elements to the interactive structural grid view
                data.episodes.forEach((ep, idx) => {
                    const epCard = document.createElement('div');
                    epCard.className = `episode-card ${idx === 0 ? 'active-episode' : ''}`;
                    epCard.id = `ep-card-${idx}`;
                    
                    epCard.innerHTML = `
                        <div class="ep-header">
                            <span class="ep-number">Episode ${idx + 1}</span>
                        </div>
                        <div class="ep-title">${ep.name}</div>
                        <button class="apple-glass-btn ep-btn-play" onclick="changeActiveEpisodeStream(${idx}, '${id}')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            Play Episode
                        </button>
                    `;
                    episodesGrid.appendChild(epCard);
                });
            } else {
                tabPlayer.src = data.videoUrl;
                tabPlayer.poster = data.billboardPosterUrl;
                tabPlayer.style.display = 'block';
            }

            // Custom typography header decoration blocks injection routing
            if (data.themeStyle === 'fiery-orange') modalTitle.className = 'fiery-title';
            else if (data.themeStyle === 'cold-steel') modalTitle.className = 'cold-title';
            else if (data.themeStyle === 'electric-blue') modalTitle.className = 'blue-title';
            else if (data.themeStyle === 'regal-gold') modalTitle.className = 'gold-title';
            else modalTitle.className = '';

            // Render standalone structural transparency branding vector graphics
            if (data.logoUrl && data.logoUrl !== '') {
                modalLogo.src = data.logoUrl;
                modalLogo.style.display = 'block';
                modalLogo.style.opacity = '1';
                // Hide plain text block layout title if vector emblem graphic scales correctly
                if (data.hideTextOnBillboard) {
                    modalTitle.style.display = 'none';
                }
            }

            detailOverlay.style.display = 'block';
            setTimeout(() => { detailOverlay.style.opacity = '1'; }, 10);
            document.body.style.overflow = 'hidden';
        }

        // ==========================================
        // STRUCTURAL EPISODE SWAP MANAGER
        // ==========================================
        function changeActiveEpisodeStream(targetIdx, seriesId) {
            const data = seriesDatabase[seriesId];
            if (!data || !data.episodes || !data.episodes[targetIdx]) return;

            // Remove highlighted style tags across old selected instances elements array block
            const pastCard = document.getElementById(`ep-card-${currentActiveEpisodeIndex}`);
            if (pastCard) pastCard.classList.remove('active-episode');

            // Apply selected focus classes straight onto modern targets array grid element
            currentActiveEpisodeIndex = targetIdx;
            const modernCard = document.getElementById(`ep-card-${targetIdx}`);
            if (modernCard) modernCard.classList.add('active-episode');

            // Hard reload new multimedia path target directly into the main playback architecture viewport canvas element
            tabPlayer.pause();
            tabPlayer.src = data.episodes[targetIdx].url;
            tabPlayer.load();
            tabPlayer.play();
            
            // Auto scroll main parent frame wrapper view container naturally straight back to header viewport segment
            document.getElementById('detail-overlay').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeMovieTab() {
            tabPlayer.pause();
            detailOverlay.style.opacity = '0';
            setTimeout(() => { detailOverlay.style.display = 'none'; }, 400);
            document.body.style.overflow = 'auto';
        }

        // Hide overlay logo details dynamically when video plays natively
        tabPlayer.addEventListener('play', () => { modalLogo.style.opacity = '0'; });
        tabPlayer.addEventListener('ended', () => {
            if (modalLogo.src && modalLogo.src !== window.location.href) modalLogo.style.opacity = '1';
        });

        // App Initialization
        window.addEventListener('DOMContentLoaded', () => {
            buildGridUI('movies');
            setupBillboardBanner('goat', 'movies'); // Default home landing focuses directly on GOAT (2026) video element
            initTabPillPositions();
        });
    </script>

</body>
