<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetTube</title>
    <!-- Dynamic SVG Favicon Integration -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300f2fe'><path d='M4 6H14C15.1 6 16 6.9 16 8V16C16 17.1 15.1 18 14 18H4C2.9 18 2 17.1 2 16V8C2 6.9 2.9 6 4 6Z'/><path d='M23 7.5L18 11V13L23 16.5V7.5Z'/></svg>">
    
    <!-- Premium Cinematic / Apple UI Typography Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Apple Glassmorphism Utility Class */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(35px) saturate(210%);
            -webkit-backdrop-filter: blur(35px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Re-engineered Apple Glass Pill System Buttons */
        .apple-glass-btn {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #ffffff;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.15), 0 8px 32px rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .apple-glass-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.03) translateY(-1px);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.25), 0 12px 40px rgba(255, 255, 255, 0.05);
        }
        
        .apple-glass-btn:active {
            transform: scale(0.98) translateY(0);
        }

        /* Transparent Top Navigation Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 4%;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.9rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        .logo svg {
            width: 34px;
            height: 34px;
            fill: url(#cyan-gradient);
            filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.6));
            flex-shrink: 0;
        }

        /* Apple Glass Segmented Pill Controller */
        .tab-container {
            position: relative;
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 5px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .tab-btn {
            position: relative;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.55);
            padding: 10px 28px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            z-index: 2;
            transition: color 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            font-family: 'Inter', sans-serif;
            border-radius: 50px;
        }

        .tab-btn.active {
            color: #ffffff;
            font-weight: 600;
        }

        .active-pill {
            position: absolute;
            top: 5px;
            left: 5px;
            height: calc(100% - 10px);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 4px 12px rgba(0,0,0,0.25);
            border-radius: 50px;
            z-index: 1;
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), width 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }

        /* Hero Billboard Banner Section */
        .billboard-container {
            position: relative;
            width: 100%;
            height: 80vh;
            min-height: 600px;
            background-color: #000000; /* Locked to deep black background */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* New Static Play Prompt Display Block */
        .media-placeholder-screen {
            text-align: center;
            z-index: 2;
        }

        .media-placeholder-screen h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .media-placeholder-screen p {
            font-family: 'Inter', sans-serif;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .btn-play {
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.1);
        }

        .btn-play:hover {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.3), 0 0 30px rgba(0, 242, 254, 0.4);
            border-color: rgba(0, 242, 254, 0.6);
            background: rgba(0, 242, 254, 0.15);
        }

        /* Media Card Grid Shelf */
        .shelf {
            padding: 40px 4% 80px 4%;
            background-color: #000000;
            position: relative;
            z-index: 5;
        }

        .shelf h2 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: rgba(220, 235, 255, 0.95);
            letter-spacing: -0.3px;
        }

        .library-content-view {
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 1;
            transform: translateY(0);
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }

        .movie-card {
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: #070708;
        }

        .movie-card:hover {
            transform: scale(1.04) translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 242, 254, 0.12);
            border-color: rgba(0, 242, 254, 0.25);
        }

        .poster-container {
            position: relative;
            width: 100%;
            height: 360px;
            overflow: hidden;
            background-color: #111;
        }

        .movie-card img.poster-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .movie-card-title {
            padding: 18px;
            font-size: 1.05rem;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: rgba(225, 240, 255, 0.85);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Full Screen Immersive Detail Overlay Panel */
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #000000; /* Force complete black display layout */
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <svg viewBox="0 0 24 24">
                <defs>
                    <linearGradient id="cyan-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00f2fe" />
                        <stop offset="100%" stop-color="#4facfe" />
                    </linearGradient>
                </defs>
                <path d='M4 6H14C15.1 6 16 6.9 16 8V16C16 17.1 15.1 18 14 18H4C2.9 18 2 17.1 2 16V8C2 6.9 2.9 6 4 6Z'/>
                <path d='M23 7.5L18 11V13L23 16.5V7.5Z'/>
            </svg>
            NetTube
        </div>
        <div class="tab-container">
            <button class="tab-btn active">Movies</button>
            <button class="tab-btn">Series</button>
            <div class="active-pill"></div>
        </div>
    </header>

    <!-- Fixed Billboard Block with Stable Black Background & Prompt -->
    <section class="billboard-container">
        <div class="media-placeholder-screen">
            <h2>Press Play</h2>
            <p>Select a title below or hit play to start your movie</p>
            <button class="apple-glass-btn btn-play">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                Play Movie
            </button>
        </div>
    </section>

    <main class="shelf">
        <h2>Recently Added</h2>
        <div class="library-content-view">
            <div class="movie-grid">
                <div class="movie-card">
                    <div class="poster-container">
                        <div class="poster-art" style="background: #151518; width: 100%; height: 100%;"></div>
                    </div>
                    <div class="movie-card-title">Sample Movie Feature</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Complete Blackout Glitch-Free Detailed Viewer Overlay -->
    <div class="detail-overlay" id="videoOverlay">
        <div class="media-placeholder-screen">
            <h2>Press Play</h2>
            <p>Ready to start playing the movie</p>
            <button class="apple-glass-btn btn-play">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                Play Now
            </button>
        </div>
    </div>

</body>
</html>
