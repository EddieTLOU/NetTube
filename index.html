<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetTube</title>
    <!-- Dynamic SVG Favicon Integration -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300f2fe'><path d='M4 6H14C15.1 6 16 6.9 16 8V16C16 17.1 15.1 18 14 18H4C2.9 18 2 17.1 2 16V8C2 6.9 2.9 6 4 6Z'/><path d='M23 7.5L18 11V13L23 16.5V7.5Z'/></svg>">
    
    <!-- Premium Cinematic / Apple UI Typography Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Apple Glassmorphism Utility Class */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(35px) saturate(210%);
            -webkit-backdrop-filter: blur(35px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Re-engineered Apple Glass Pill System Buttons */
        .apple-glass-btn {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #ffffff;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.15), 0 8px 32px rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .apple-glass-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.03) translateY(-1px);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.25), 0 12px 40px rgba(255, 255, 255, 0.05);
        }
        
        .apple-glass-btn:active {
            transform: scale(0.98) translateY(0);
        }

        /* Transparent Top Navigation Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 4%;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.9rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        .logo svg {
            width: 34px;
            height: 34px;
            fill: url(#cyan-gradient);
            filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.6));
            flex-shrink: 0;
        }

        /* Apple Glass Segmented Pill Controller */
        .tab-container {
            position: relative;
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 5px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .tab-btn {
            position: relative;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.55);
            padding: 10px 28px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            z-index: 2;
            transition: color 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            font-family: 'Inter', sans-serif;
            border-radius: 50px;
        }

        .tab-btn.active {
            color: #ffffff;
            font-weight: 600;
        }

        .active-pill {
            position: absolute;
            top: 5px;
            left: 5px;
            height: calc(100% - 10px);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 4px 12px rgba(0,0,0,0.25);
            border-radius: 50px;
            z-index: 1;
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), width 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }

        /* Hero Billboard Banner Section */
        .billboard-container {
            position: relative;
            width: 100%;
            height: 80vh;
            min-height: 600px;
            background-size: cover;
            background-position: center 20%;
            background-repeat: no-repeat;
            display: flex;
            align-items: flex-end;
            transition: background-image 0.5s ease;
        }

        .billboard-vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(75deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0) 100%),
                        linear-gradient(to top, #000000 0%, rgba(0,0,0,0) 25%);
            z-index: 1;
        }

        .billboard-content {
            position: relative;
            z-index: 2;
            padding: 0 4% 80px 4%;
            max-width: 800px;
        }

        .billboard-logo-img {
            max-width: 380px;
            width: 100%;
            height: auto;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.5));
            display: none;
        }

        .billboard-content h1 {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 3.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #ffffff 30%, #a1c4fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
        }

        .billboard-content h1.blue-goat-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.2rem;
            font-weight: 900;
            background: linear-gradient(180deg, #00ffff 0%, #0088ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 136, 255, 0.6)) drop-shadow(0 4px 10px rgba(0,0,0,0.8));
            letter-spacing: 2px;
        }

        .billboard-content h1.fiery-orange-title {
            background: linear-gradient(180deg, #ff9900 0%, #ff3300 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(255, 67, 0, 0.6)) drop-shadow(0 4px 12px rgba(0,0,0,0.7));
        }

        .billboard-content h1.regal-gold-title {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(180deg, #ffe066 0%, #f5af19 50%, #e65c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(245, 175, 25, 0.5)) drop-shadow(0 4px 15px rgba(0,0,0,0.9));
        }

        .billboard-content p {
            color: rgba(210, 225, 245, 0.85);
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            font-weight: 300;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .btn-play {
            padding: 16px 36px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .btn-play.coming-soon-btn {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: none;
            cursor: default;
        }
        .btn-play.coming-soon-btn:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: none;
            box-shadow: none;
        }

        .btn-play.fiery-glow:hover {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 0 30px rgba(255, 67, 0, 0.4);
            border-color: rgba(255, 67, 0, 0.5);
            background: rgba(255, 67, 0, 0.12);
        }

        .btn-play.neon-blue-glow:hover {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 0 30px rgba(0, 242, 254, 0.4);
            border-color: rgba(0, 242, 254, 0.5);
            background: rgba(0, 242, 254, 0.12);
        }

        .btn-play.squid-magenta-glow:hover {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 0 30px rgba(255, 10, 140, 0.4);
            border-color: rgba(255, 10, 140, 0.5);
            background: rgba(255, 10, 140, 0.12);
        }

        /* Media Card Grid Shelf */
        .shelf {
            padding: 40px 4% 80px 4%;
            background-color: #000000;
            position: relative;
            z-index: 5;
        }

        .shelf h2 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: rgba(220, 235, 255, 0.95);
            letter-spacing: -0.3px;
        }

        .library-content-view {
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 1;
            transform: translateY(0);
        }

        .library-content-view.fade-out {
            opacity: 0;
            transform: translateY(10px);
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }

        .movie-card {
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: #070708;
        }

        .movie-card:hover {
            transform: scale(1.04) translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 242, 254, 0.12);
            border-color: rgba(0, 242, 254, 0.25);
        }

        .movie-card.squid-hover:hover {
            box-shadow: 0 20px 40px rgba(255, 10, 140, 0.18);
            border-color: rgba(255, 10, 140, 0.35);
        }

        .movie-card.gold-flare-hover:hover {
            box-shadow: 0 20px 40px rgba(245, 175, 25, 0.18);
            border-color: rgba(245, 175, 25, 0.35);
        }

        .poster-container {
            position: relative;
            width: 100%;
            height: 360px;
            overflow: hidden;
            background-color: #111;
        }

        .movie-card img.poster-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .movie-card:hover img.poster-art {
            transform: scale(1.05);
        }

        .movie-card .card-logo-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-height: 75px;
            object-fit: contain;
            filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.9));
        }

        .card-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 14px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 50px;
            letter-spacing: 0.5px;
            z-index: 3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .badge-gold {
            background: linear-gradient(135deg, #f5af19 0%, #e65c00 100%);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .badge-magenta {
            background: linear-gradient(135deg, #ff0a8c 0%, #a30050 100%);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .movie-card-title {
            padding: 18px;
            font-size: 1.05rem;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: rgba(225, 240, 255, 0.85);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Full Screen Immersive Detail Overlay Panel */
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(0, 2, 7, 0.97);
            z-index: 200;
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            overflow-y: auto;
        }

        .detail-modal {
            max-width: 1100px;
            margin: 40px auto;
            width: 92%;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 60px rgba(0, 242, 254, 0.08);
            margin-bottom: 60px;
        }

        /* =======================================================
           RE-ENGINEERED PERMANENT BACKDROP LAYER (ANTI-GLITCH FIX)
           ======================================================= */
        .modal-player-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000000;
            overflow: hidden;
        }

        /* This pseudo-element holds the wallpaper locked safely underneath video states */
        .modal-player-box::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: var(--modal-bg-fallback);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            pointer-events: none;
            display: block;
        }

        .modal-player-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: relative;
            z-index: 2; /* Sits clean over backdrop stack */
            background: transparent;
        }

        .modal-placeholder-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 3;
            display: none;
        }

        /* Dynamic Glass Apple Controller Interface Overlay */
        .custom-player-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            padding: 14px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        .modal-player-box:hover .custom-player-controls {
            opacity: 1;
        }

        .player-ctrl-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, color 0.2s ease;
            width: 32px;
            height: 32px;
        }
        .player-ctrl-btn:hover {
            color: #00f2fe;
            transform: scale(1.1);
        }

        /* Custom Timeline Tracker Scrubber */
        .timeline-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            position: relative;
            cursor: pointer;
            height: 20px;
        }

        .timeline-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .timeline-progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
        }

        .time-display {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Inter', sans-serif;
            min-width: 90px;
            text-align: center;
        }

        /* Modal Context Window Meta Info */
        .modal-info {
            padding: 40px;
        }

        .modal-info h2 {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .modal-season-tag {
            font-size: 1.05rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff0a8c;
            margin-bottom: 20px;
            display: none;
        }

        .modal-info h2.cold-title { background: linear-gradient(180deg, #ffffff 20%, #a1c4fd 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-info h2.fiery-title { background: linear-gradient(180deg, #ff9900 0%, #ff3300 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-info h2.blue-title { font-family: 'Orbitron', sans-serif; background: linear-gradient(180deg, #00ffff 0%, #0088ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .modal-info h2.gold-title { background: linear-gradient(180deg, #ffe066 0%, #f5af19 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .modal-info p {
            color: rgba(215, 230, 250, 0.75);
            font-size: 1.1rem;
            line-height: 1.7;
            font-weight: 300;
            margin-bottom: 35px;
        }

        /* Series Episode Architecture Panels */
        .episodes-section {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 35px;
            margin-top: 10px;
            display: none;
        }

        .episodes-section h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .episode-card {
            display: flex;
            flex-direction: column;
            padding: 18px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .episode-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 10, 140, 0.3);
            transform: translateY(-2px);
        }

        .episode-card.active-episode {
            background: rgba(255, 10, 140, 0.08);
            border-color: rgba(255, 10, 140, 0.5);
            box-shadow: 0 8px 24px rgba(255, 10, 140, 0.1);
        }

        .ep-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .ep-number {
            font-size: 0.78rem;
            font-weight: 700;
            color: #ff0a8c;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ep-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 16px;
        }

        .ep-btn-play {
            margin-top: auto;
            width: 100%;
            padding: 10px 16px;
            font-size: 0.88rem;
        }

        .btn-close {
            position: absolute;
            top: 25px;
            right: 25px;
            width: 46px;
            height: 46px;
            font-size: 1.1rem;
            z-index: 220;
        }
    </style>
</head>
<body>

    <!-- SVG Master Gradient Assets Frame -->
    <svg style="display: none;">
        <defs>
            <linearGradient id="cyan-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00f2fe" />
                <stop offset="100%" stop-color="#4facfe" />
            </linearGradient>
        </defs>
    </svg>

    <!-- Top Navigation Header -->
    <header>
        <div class="logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 6H14C15.1 6 16 6.9 16 8V16C16 17.1 15.1 18 14 18H4C2.9 18 2 17.1 2 16V8C2 6.9 2.9 6 4 6Z"/>
                <path d="M23 7.5L18 11V13L23 16.5V7.5Z"/>
            </svg>
            <span>NetTube</span>
        </div>

        <!-- Segmented Tab Switching Box -->
        <div class="tab-container">
            <div id="active-pill" class="active-pill"></div>
            <button id="tab-movies" class="tab-btn active" onclick="switchLibraryTab('movies')">Movies</button>
            <button id="tab-series" class="tab-btn" onclick="switchLibraryTab('series')">Series</button>
        </div>
        
        <div style="width: 140px; display: block;"></div>
    </header>

    <!-- Hero Billboard Block -->
    <section id="hero-billboard" class="billboard-container">
        <div class="billboard-vignette"></div>
        <div class="billboard-content">
            <img id="hero-logo-img" class="billboard-logo-img" src="" alt="Series Branding Logo">
            <h1 id="hero-title">Loading Dashboard...</h1>
            <p id="hero-desc"></p>
            <button id="hero-play-btn" class="apple-glass-btn btn-play"></button>
        </div>
    </section>

    <!-- Media Shelves Grid Frame -->
    <section class="shelf">
        <h2 id="shelf-heading">Your Movies</h2>
        <div id="library-content-view" class="library-content-view">
            <div class="movie-grid" id="library-grid"></div>
        </div>
    </section>

    <!-- Main Immersive Overlay Platform -->
    <div id="detail-overlay" class="detail-overlay">
        <button class="apple-glass-btn btn-close" onclick="closeMovieTab()">✕</button>
        
        <div id="detail-modal-box" class="detail-modal glass-panel">
            <div id="player-container-frame" class="modal-player-box">
                
                <!-- Main HTML5 Video Asset Layer -->
                <video id="tab-video-player" preload="metadata"></video>
                <img id="tab-image-placeholder" class="modal-placeholder-image" src="" alt="Fallback Content Frame">

                <!-- Custom Control Deck UI -->
                <div id="custom-controls" class="custom-player-controls glass-panel">
                    <button id="ctrl-play-btn" class="player-ctrl-btn" onclick="togglePlayerPlayback()">▶</button>
                    
                    <div class="timeline-container" onclick="scrubPlaybackTimeline(event)">
                        <div class="timeline-bg">

        const ctrlPlayBtn = document.getElementById('ctrl-play-btn');

        function setupBillboardBanner(id, scope) {
            const db = (scope === 'movies') ? moviesDatabase : seriesDatabase;
            const data = db[id];
            if (!data) return;

            billboard.style.backgroundImage = `url('${data.billboardPosterUrl}')`;
            heroTitle.className = '';
            heroPlayBtn.className = 'apple-glass-btn btn-play';
            
            if (data.themeStyle === 'fiery-orange') {
                heroTitle.classList.add('fiery-orange-title');
                heroPlayBtn.classList.add('fiery-glow');
            } else if (data.themeStyle === 'electric-blue') {
                heroTitle.classList.add('blue-goat-title');
                heroPlayBtn.classList.add('neon-blue-glow');
            } else if (data.themeStyle === 'regal-gold') {
                heroTitle.classList.add('regal-gold-title');
            } else if (data.themeStyle === 'squid-magenta') {
                heroPlayBtn.classList.add('squid-magenta-glow');
            }

            if (data.hideTextOnBillboard && data.logoUrl) {
                heroTitle.style.display = 'none';
                heroLogoImg.src = data.logoUrl;
                heroLogoImg.style.display = 'block';
            } else {
                heroTitle.textContent = data.title;
                heroTitle.style.display = 'block';
                heroLogoImg.style.display = 'none';
            }

            heroDesc.textContent = data.description;

            if (data.isComingSoon) {
                heroPlayBtn.innerHTML = '<span>⏳ Coming Soon</span>';
                heroPlayBtn.classList.add('coming-soon-btn');
                heroPlayBtn.onclick = null;
            } else {
                heroPlayBtn.innerHTML = '<span>▶</span> Watch Now';
                heroPlayBtn.onclick = () => launchMovieTab(id, scope);
            }
        }

        function buildMediaLibraryGrid(scope) {
            libraryGrid.innerHTML = '';
            const db = (scope === 'movies') ? moviesDatabase : seriesDatabase;

            Object.keys(db).forEach(key => {
                const item = db[key];
                const card = document.createElement('div');
                card.className = 'movie-card';
                if (item.themeStyle === 'squid-magenta') card.classList.add('squid-hover');
                if (item.themeStyle === 'regal-gold') card.classList.add('gold-flare-hover');

                let badgeHtml = '';
                if (item.isComingSoon) {
                    badgeHtml = `<div class="card-badge badge-gold">Coming Soon</div>`;
                } else if (item.isSeries) {
                    badgeHtml = `<div class="card-badge badge-magenta">Full Season</div>`;
                }

                let overlayLogoHtml = '';
                if (item.hideTextOnBillboard && item.logoUrl) {
                    overlayLogoHtml = `<img class="card-logo-overlay" src="${item.logoUrl}" alt="logo">`;
                }

                card.innerHTML = `
                    <div class="poster-container">
                        ${badgeHtml}
                        <img class="poster-art" src="${item.libraryPosterUrl}" alt="${item.title}">
                        ${overlayLogoHtml}
                    </div>
                    <div class="movie-card-title">${item.hideTextOnBillboard && item.logoUrl ? '' : item.title}</div>
                `;

                card.onclick = () => launchMovieTab(key, scope);
                libraryGrid.appendChild(card);
            });
        }

        function switchLibraryTab(scope) {
            if (currentTabScope === scope) return;
            currentTabScope = scope;

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const clickedBtn = document.getElementById(`tab-${scope}`);
            clickedBtn.classList.add('active');

            const activePill = document.getElementById('active-pill');
            activePill.style.transform = `translateX(${clickedBtn.offsetLeft - 5}px)`;
            activePill.style.width = `${clickedBtn.offsetWidth}px`;

            contentContainerView.classList.add('fade-out');
            
            setTimeout(() => {
                shelfHeading.textContent = (scope === 'movies') ? 'Your Movies' : 'Your Series';
                const defaultId = (scope === 'movies') ? 'mar1' : 'squidgame';
                
                setupBillboardBanner(defaultId, scope);
                buildMediaLibraryGrid(scope);
                
                contentContainerView.classList.remove('fade-out');
            }, 300);
        }

        // ==========================================
        // IMMERSIVE MULTIMEDIA LAUNCHER
        // ==========================================
        function launchMovieTab(id, scope) {
            const db = (scope === 'movies') ? moviesDatabase : seriesDatabase;
            const data = db[id];
            if (!data) return;

            tabPlayer.pause();
            tabPlayer.src = '';
            ctrlPlayBtn.textContent = '▶';
            ctrlProgress.style.width = '0%';
            ctrlTimeText.textContent = '00:00 / 00:00';
            
            detailModalBox.className = 'detail-modal glass-panel';
            modalTitle.className = '';

            // FIXED: Set background via CSS custom variable to keep it locked inside the safe pseudo-element
            playerFrameBox.style.setProperty('--modal-bg-fallback', `url('${data.billboardPosterUrl}')`);

            if (data.themeStyle === 'regal-gold') {
                detailModalBox.classList.add('gold-modal-glow');
                modalTitle.classList.add('gold-title');
            } else if (data.themeStyle === 'squid-magenta') {
                detailModalBox.classList.add('squid-modal-glow');
                modalTitle.classList.add('squid-title');
            } else if (data.themeStyle === 'electric-blue') {
                modalTitle.classList.add('blue-title');
            } else if (data.themeStyle === 'fiery-orange') {
                modalTitle.classList.add('fiery-title');
            } else if (data.themeStyle === 'cold-steel') {
                modalTitle.classList.add('cold-title');
            }

            modalTitle.textContent = data.title;
            modalDesc.textContent = data.description;

            if (data.isComingSoon) {
                tabPlayer.style.display = 'none';
                customControlsDeck.style.display = 'none';
                tabImagePlaceholder.src = data.billboardPosterUrl;
                tabImagePlaceholder.style.display = 'block';
            } else {
                tabImagePlaceholder.style.display = 'none';
                tabPlayer.style.display = 'block';
                customControlsDeck.style.display = 'flex';
            }

            if (data.isSeries) {
                modalSeasonTag.textContent = data.seasonLabel || 'Season 1';
                modalSeasonTag.style.display = 'block';
                modalEpisodesSection.style.display = 'block';
                
                episodesGrid.innerHTML = '';
                data.episodes.forEach((ep, index) => {
                    const epCard = document.createElement('div');
                    epCard.className = `episode-card ${index === 0 ? 'active-episode' : ''}`;
                    epCard.id = `ep-card-${index}`;
                    
                    epCard.innerHTML = `
                        <div class="ep-header">
                            <span class="ep-number">Episode ${index + 1}</span>
                        </div>
                        <div class="ep-title">${ep.name}</div>
                        <button class="apple-glass-btn ep-btn-play" onclick="changeEpisodeTrack('${id}', ${index})">
                            ▶ Play Track
                        </button>
                    `;
                    episodesGrid.appendChild(epCard);
                });

                currentActiveEpisodeIndex = 0;
                if (!data.isComingSoon) {
                    tabPlayer.src = data.episodes[0].url;
                }
            } else {
                modalSeasonTag.style.display = 'none';
                modalEpisodesSection.style.display = 'none';
                if (!data.isComingSoon) {
                    tabPlayer.src = data.videoUrl;
                }
            }

            detailOverlay.style.display = 'block';
            setTimeout(() => {
                detailOverlay.style.opacity = '1';
            }, 10);
        }

        function togglePlayerPlayback() {
            if (tabPlayer.paused || tabPlayer.ended) {
                tabPlayer.play();
                ctrlPlayBtn.textContent = '⏸';
            } else {
                tabPlayer.pause();
                ctrlPlayBtn.textContent = '▶';
            }
        }

        tabPlayer.addEventListener('timeupdate', () => {
            if (!tabPlayer.duration) return;
            const percentage = (tabPlayer.currentTime / tabPlayer.duration) * 100;
            ctrlProgress.style.width = `${percentage}%`;
            ctrlTimeText.textContent = `${formatDurationUnits(tabPlayer.currentTime)} / ${formatDurationUnits(tabPlayer.duration)}`;
        });

        function formatDurationUnits(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function scrubPlaybackTimeline(event) {
            const rect = event.currentTarget.getBoundingClientRect();
            const clickPositionX = event.clientX - rect.left;
            const targetPercentage = clickPositionX / rect.width;
            if (tabPlayer.duration) {
                tabPlayer.currentTime = targetPercentage * tabPlayer.duration;
            }
        }

        function togglePlayerFullScreen() {
            if (!document.fullscreenElement) {
                playerFrameBox.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function changeEpisodeTrack(seriesId, targetIndex) {
            const data = seriesDatabase[seriesId];
            if (!data || !data.episodes[targetIndex]) return;

            document.querySelectorAll('.episode-card').forEach(c => c.classList.remove('active-episode'));
            document.getElementById(`ep-card-${targetIndex}`).classList.add('active-episode');

            currentActiveEpisodeIndex = targetIndex;
            tabPlayer.src = data.episodes[targetIndex].url;
            ctrlPlayBtn.textContent = '▶';
            tabPlayer.play().then(() => {
                ctrlPlayBtn.textContent = '⏸';
            }).catch(() => {});
        }

        function closeMovieTab() {
            detailOverlay.style.opacity = '0';
            tabPlayer.pause();
            tabPlayer.src = '';
            setTimeout(() => {
                detailOverlay.style.display = 'none';
            }, 400);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeMovieTab();
        });

        window.addEventListener('DOMContentLoaded', () => {
            setupBillboardBanner('mk1', 'movies');
            buildMediaLibraryGrid('movies');
            
            const defaultBtn = document.getElementById('tab-movies');
            const activePill = document.getElementById('active-pill');
            activePill.style.width = `${defaultBtn.offsetWidth}px`;
        });// ==========================================
// SAFE AUTO-HIDE CONTROLS ENGINE (NO BREAK FIX)
// ==========================================
(function() {
    let controlsTimer;
    
    // Safety check: wait until the page fully loads so elements exist
    window.addEventListener('DOMContentLoaded', () => {
        const playerFrame = document.getElementById('player-container-frame');
        const controlDeck = document.getElementById('custom-controls');
        const videoElement = document.getElementById('tab-video-player');

        // If your HTML elements aren't matching up perfectly, stop immediately so nothing breaks
        if (!playerFrame || !controlDeck) return;

        // Force a smooth fade transition into the CSS dynamically (keeps your style sheet safe)
        controlDeck.style.transition = "opacity 0.4s ease-in-out";

        function resetControlsTimeout() {
            // Instantly bring the play bar back to view
            controlDeck.style.opacity = '1';
            controlDeck.style.pointerEvents = 'auto';

            // Cancel any previous countdowns currently ticking down
            clearTimeout(controlsTimer);

            // Start a fresh 2-second countdown
            controlsTimer = setTimeout(() => {
                // Only hide the bar if a movie is actively playing!
                if (videoElement && !videoElement.paused) {
                    controlDeck.style.opacity = '0';
                    controlDeck.style.pointerEvents = 'none';
                }
            }, 2000); // 2000ms = 2 seconds
        }

        // Listen for mouse movement or screen taps anywhere inside the video box area
        playerFrame.addEventListener('mousemove', resetControlsTimeout);
        playerFrame.addEventListener('touchstart', resetControlsTimeout);
        
        // Also show controls if the movie gets paused manually
        if (videoElement) {
            videoElement.addEventListener('pause', () => {
                controlDeck.style.opacity = '1';
                controlDeck.style.pointerEvents = 'auto';
                clearTimeout(controlsTimer);
            });
        }
    });
})();
