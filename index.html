<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetTube</title>
    <!-- Premium Cinematic / Apple UI Typography Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@300;400;500;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Apple Glassmorphism Utility Class */
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(35px) saturate(210%);
            -webkit-backdrop-filter: blur(35px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Apple Glass Pill Overlay Style for Interactive Buttons */
        .apple-glass-btn {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #ffffff;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.15), 0 4px 15px rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s cubic-bezier(0.25, 1, 0.5, 1), 
                        border-color 0.3s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.2s ease, 
                        box-shadow 0.3s ease;
        }

        .apple-glass-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 6px 20px rgba(255, 255, 255, 0.05);
        }

        /* Transparent Top Navigation Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 4%;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
        }

        /* NetTube Logo Text with Electric Cyan Theme */
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.9rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        /* Dynamic SVG Logo Icon Treatment */
        .logo svg {
            width: 32px;
            height: 32px;
            fill: url(#cyan-gradient);
            filter: drop-shadow(0 0 8px rgba(0, 242, 254, 0.6));
            flex-shrink: 0;
        }

        /* ==========================================
           APPLE GLASS SEGMENTED CONTROLLER (TABS)
           ========================================== */
        .tab-container {
            position: relative;
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 4px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .tab-btn {
            position: relative;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            padding: 8px 24px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            z-index: 2;
            transition: color 0.30s cubic-bezier(0.25, 1, 0.5, 1);
            font-family: 'Inter', sans-serif;
        }

        .tab-btn.active {
            color: #ffffff;
            font-weight: 600;
        }

        /* Animated Sliding Glass Capsule Backdrop */
        .active-pill {
            position: absolute;
            top: 4px;
            left: 4px;
            height: calc(100% - 8px);
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 4px 12px rgba(0,0,0,0.25);
            border-radius: 9px;
            z-index: 1;
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), width 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }

        /* Full Edge-to-Edge Billboard Hero Banner Section */
        .billboard-container {
            position: relative;
            width: 100%;
            height: 75vh;
            min-height: 550px;
            background-size: cover;
            background-position: center 20%;
            background-repeat: no-repeat;
            display: flex;
            align-items: flex-end;
            transition: background-image 0.5s ease;
        }

        /* Netflix-style Vignette Shading to fade into dark library */
        .billboard-vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(75deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0) 100%),
                        linear-gradient(to top, #000000 0%, rgba(0,0,0,0) 25%);
            z-index: 1;
        }

        .billboard-content {
            position: relative;
            z-index: 2;
            padding: 0 4% 60px 4%;
            max-width: 800px;
        }

        /* Large Brand Emblem Layout inside Billboard Panel */
        .billboard-logo-img {
            max-width: 380px;
            width: 100%;
            height: auto;
            object-fit: contain;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.5));
            display: none;
        }

        /* Default Ice Cool Title text layout */
        .billboard-content h1 {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 3.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: 1px;
            background: linear-gradient(180deg, #ffffff 30%, #a1c4fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
        }

        /* Custom Class for GOAT Electric Ice Blue Title Header */
        .billboard-content h1.blue-goat-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.2rem;
            font-weight: 900;
            background: linear-gradient(180deg, #00ffff 0%, #0088ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 136, 255, 0.6)) drop-shadow(0 4px 10px rgba(0,0,0,0.8));
            letter-spacing: 2px;
        }

        /* Custom Class for Mortal Kombat Fiery Orange Title Header */
        .billboard-content h1.fiery-orange-title {
            background: linear-gradient(180deg, #ff9900 0%, #ff3300 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(255, 67, 0, 0.6)) drop-shadow(0 4px 12px rgba(0,0,0,0.7));
        }

        /* Custom Class for Michael Jackson Premium Regal Golden Title Header */
        .billboard-content h1.regal-gold-title {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: 3px;
            background: linear-gradient(180deg, #ffe066 0%, #f5af19 50%, #e65c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(245, 175, 25, 0.5)) drop-shadow(0 4px 15px rgba(0,0,0,0.9));
        }

        /* Custom Class for Coming Soon button state */
        .btn-play.coming-soon-btn {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: none;
            cursor: default;
        }
        .btn-play.coming-soon-btn:hover {
            background: rgba(255, 255, 255, 0.03);
            transform: none;
            box-shadow: none;
            border-color: rgba(255, 255, 255, 0.05);
        }

        .billboard-content p {
            color: rgba(210, 225, 245, 0.85);
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 300;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        /* Integrated Apple Glass Play Button Layout */
        .btn-play {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Unique Hover Glow Themes Over Apple Glass Foundation */
        .btn-play.fiery-glow:hover {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 0 25px rgba(255, 67, 0, 0.5);
            border-color: rgba(255, 67, 0, 0.4);
            background: rgba(255, 67, 0, 0.15);
        }

        .btn-play.neon-blue-glow:hover {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 0 25px rgba(0, 242, 254, 0.5);
            border-color: rgba(0, 242, 254, 0.4);
            background: rgba(0, 242, 254, 0.15);
        }

        .btn-play.squid-magenta-glow:hover {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2), 0 0 25px rgba(255, 10, 140, 0.6);
            border-color: rgba(255, 10, 140, 0.5);
            background: rgba(255, 10, 140, 0.15);
        }

        /* Movie Selection Shelf */
        .shelf {
            padding: 40px 4% 60px 4%;
            background-color: #000000;
            position: relative;
            z-index: 5;
        }

        .shelf h2 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: rgba(220, 235, 255, 0.95);
            letter-spacing: -0.3px;
        }

        /* Grid View Layout with crossfade smooth transitions */
        .library-content-view {
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 1;
            transform: translateY(0);
        }

        .library-content-view.fade-out {
            opacity: 0;
            transform: translateY(10px);
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 30px;
        }

        .movie-card {
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease, border-color 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .movie-card:hover {
            transform: scale(1.04);
            box-shadow: 0 20px 40px rgba(0, 242, 254, 0.15);
            border-color: rgba(0, 242, 254, 0.3);
        }

        .movie-card.squid-hover:hover {
            box-shadow: 0 20px 40px rgba(255, 10, 140, 0.25);
            border-color: rgba(255, 10, 140, 0.4);
        }

        /* Distinct gold flare outline for the Michael Jackson portrait card */
        .movie-card.gold-flare-hover:hover {
            box-shadow: 0 20px 40px rgba(245, 175, 25, 0.25);
            border-color: rgba(245, 175, 25, 0.4);
        }

        .poster-container {
            position: relative;
            width: 100%;
            height: 360px;
            overflow: hidden;
            background-color: #111;
        }

        .movie-card img.poster-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s ease;
        }

        .movie-card:hover img.poster-art {
            transform: scale(1.05);
        }

        .movie-card .card-logo-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-height: 80px;
            object-fit: contain;
            filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.9));
        }

        /* Badge graphic label overlays */
        .card-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 6px;
            letter-spacing: 0.5px;
            z-index: 3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .badge-gold {
            background: linear-gradient(135deg, #f5af19 0%, #e65c00 100%);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .badge-magenta {
            background: linear-gradient(135deg, #ff0a8c 0%, #a30050 100%);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .movie-card-title {
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: rgba(225, 240, 255, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Full Screen Immersive Detail Overlay Panel */
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(0, 4, 12, 0.96);
            z-index: 200;
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            overflow-y: auto;
        }

        .detail-modal {
            max-width: 1100px;
            margin: 50px auto;
            width: 90%;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.1);
        }

        .detail-modal.gold-modal-glow {
            box-shadow: 0 0 60px rgba(245, 175, 25, 0.15);
        }

        .detail-modal.squid-modal-glow {
            box-shadow: 0 0 60px rgba(255, 10, 140, 0.2);
        }

        /* Interactive Detail Player Framework */
        .modal-player-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .modal-player-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Custom image presentation for coming soon/unreleased elements inside media box */
        .modal-placeholder-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .modal-logo-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45%;
            max-height: 180px;
            object-fit: contain;
            z-index: 5;
            pointer-events: none;
            filter: drop-shadow(0px 10px 25px rgba(0, 0, 0, 0.95));
            transition: opacity 0.4s ease;
            display: none;
        }

        .modal-info {
            padding: 40px;
        }

        .modal-info h2 {
            font-family: 'Cinzel', Georgia, serif;
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(180deg, #ffffff 30%, #c2ffd8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-season-tag {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff0a8c;
            margin-bottom: 20px;
            display: none;
        }

        /* Custom treatment specifically for Cold Tone text headers when active inside tab */
        .modal-info h2.cold-title {
            background: linear-gradient(180deg, #ffffff 20%, #a1c4fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Fiery Orange style fallback header for tab view */
        .modal-info h2.fiery-title {
            background: linear-gradient(180deg, #ff9900 0%, #ff3300 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Electric Blue style header for GOAT inside tab view */
        .modal-info h2.blue-title {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(180deg, #00ffff 0%, #0088ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Premium Gold style header for Michael Jackson movie view */
        .modal-info h2.gold-title {
            background: linear-gradient(180deg, #ffe066 0%, #f5af19 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-info p {
            color: rgba(215, 230, 250, 0.75);
            font-size: 1.1rem;
            line-height: 1.7;
            font-weight: 300;
            margin-bottom: 30px;
        }

        /* ==========================================
           EPISODES INTERACTIVE SELECTOR TRACK PANEL
           ========================================== */
        .episodes-section {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 30px;
            margin-top: 10px;
            display: none;
        }

        .episodes-section h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .episode-card {
            display: flex;
            flex-direction: column;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
        }

        .episode-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 10, 140, 0.4);
            transform: translateY(-2px);
        }

        .episode-card.active-episode {
            background: rgba(255, 10, 140, 0.12);
            border-color: rgba(255, 10, 140, 0.6);
        }

        .ep-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .ep-number {
            font-size: 0.8rem;
            font-weight: 700;
            color: #ff0a8c;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ep-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .ep-btn-play {
            margin-top: auto;
            width: 100%;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Overlay Interface Exit Control via Apple Glass Button Blueprint */
        .btn-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 210;
        }
    </style>
</head>
<body>

    <!-- SVG Gradient Definition Block (Hidden) -->
    <svg style="display: none;">
        <defs>
            <linearGradient id="cyan-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00f2fe" />
                <stop offset="100%" stop-color="#4facfe" />
            </linearGradient>
        </defs>
    </svg>

    <!-- Transparent Branding Bar with Integrated Tab Controller -->
    <header>
        <div class="logo">
            <!-- Cinematic Movie Camera Vector Logo Badge -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 6H14C15.1 6 16 6.9 16 8V16C16 17.1 15.1 18 14 18H4C2.9 18 2 17.1 2 16V8C2 6.9 2.9 6 4 6Z"/>
                <path d="M23 7.5L18 11V13L23 16.5V7.5Z"/>
                <circle cx="6" cy="35" r="2"/>
            </svg>
            <span>NetTube</span>
        </div>

        <!-- Apple Glass Slider Switcher Frame -->
        <div class="tab-container">
            <div id="active-pill" class="active-pill"></div>
            <button id="tab-movies" class="tab-btn active" onclick="switchLibraryTab('movies')">Movies</button>
            <button id="tab-series" class="tab-btn" onclick="switchLibraryTab('series')">Series</button>
        </div>
        
        <div style="width: 140px; display: block;"></div>
    </header>

    <!-- Edge-to-Edge Hero Banner Container -->
    <section id="hero-billboard" class="billboard-container">
        <div class="billboard-vignette"></div>
        <div class="billboard-content">
            <img id="hero-logo-img" class="billboard-logo-img" src="" alt="Series Branding Logo">
            <h1 id="hero-title">Loading...</h1>
            <p id="hero-desc"></p>
            <button id="hero-play-btn" class="apple-glass-btn btn-play"></button>
        </div>
    </section>

    <!-- Content Track Grid Selection Section -->
    <section class="shelf">
        <h2 id="shelf-heading">Your Movies</h2>
        <div id="library-content-view" class="library-content-view">
            <div class="movie-grid" id="library-grid"></div>
        </div>
    </section>

    <!-- Immersive Modal Window Interface Panel -->
    <div id="detail-overlay" class="detail-overlay">
        <button class="apple-glass-btn btn-close" onclick="closeMovieTab()">✕</button>
        
        <div id="detail-modal-box" class="detail-modal glass-panel">
            <div class="modal-player-box">
                <!-- Inner Float Logo Layer -->
                <img id="modal-logo" class="modal-logo-overlay" src="" alt="Overlay Logo">
                
                <!-- Display Video Stream vs Image Graphic Placeholders independently -->
                <video id="tab-video-player" controls preload="metadata"></video>
                <img id="tab-image-placeholder" class="modal-placeholder-image" src="" alt="Coming Soon Artwork">
            </div>
            <div class="modal-info">
                <div id="modal-season-tag" class="modal-season-tag">Season 1</div>
                <h2 id="modal-title">Movie Title</h2>
                <p id="modal-desc">Movie description information blocks go here...</p>

                <!-- SERIES EPISODE SHELF COMPONENT PANEL -->
                <div id="modal-episodes-section" class="episodes-section">
                    <h3 id="episode-list-title">Episodes (Season 1)</h3>
                    <div id="episodes-grid" class="episodes-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- CENTRAL DATABASE AND ARCHITECTURE SCRIPT -->
    <script>
        let currentTabScope = 'movies';
        let currentActiveEpisodeIndex = 0;

        // ==========================================
        // CONTENT ENGINE SEPARATED INDEXES 
        // ==========================================
        const moviesDatabase = {
            'michael': {
                title: 'Michael',
                videoUrl: '', 
                billboardPosterUrl: 'https://4kwallpapers.com/images/walls/thumbs_2t/25965.jpg',
                libraryPosterUrl: 'https://lionsgate.brightspotcdn.com/e7/e6/4ea9816e445e95f4ba96339a54e1/maven-27x40-1sht-ka-vrt-rgb-v16-online-crop.jpg',
                logoUrl: '',
                description: 'The definitive biographical motion picture chronicling the brilliant, complicated life of the King of Pop. Delivering his triumphs, struggles, unparalleled artistry, and the human being behind the global phenomenon.',
                themeStyle: 'regal-gold',
                hideTextOnBillboard: false,
                isComingSoon: true
            },
            'goat': {
                title: 'GOAT',
                videoUrl: 'https://archive.org/download/goat-2026_202605/GOAT%20%282026%29.mp4',
                billboardPosterUrl: 'https://4kwallpapers.com/images/wallpapers/goat-2026-8k-movie-7680x4320-23667.png',
                libraryPosterUrl: 'https://image.tmdb.org/t/p/original/bkIVlnO1MnTS6jL6qP0Ki2H6O3.jpg',
                logoUrl: '',
                description: 'An original action-comedy animated adventure set in an all-animal world. Will, a small pygmy goat with big dreams, gets a once-in-a-lifetime shot to join the pros and play roarball.',
                themeStyle: 'electric-blue',
                hideTextOnBillboard: false,
                isComingSoon: false
            },
            'dm4': {
                title: 'Despicable Me 4',
                videoUrl: 'https://archive.org/download/mortal-kombat-bluray-1080p/Despicable%20Me%204.mp4',
                billboardPosterUrl: 'https://4kwallpapers.com/images/wallpapers/despicable-me-4-2560x1440-15031.jpg',
                libraryPosterUrl: 'https://m.media-amazon.com/images/M/MV5BODlhNjE1NjUtNjZiNi00MDBmLWJmYWEtNTEyZjEyYzg5MTcxXkEyXkFqcGc@._V1_.jpg',
                logoUrl: '', 
                description: 'Gru, Lucy, Margo, Edith, and Agnes welcome a new member to the family, Gru Jr., who is intent on tormenting his dad. Gru faces a new nemesis in Maxime Le Mal and his femme fatale girlfriend Valentina.',
                themeStyle: 'clean-poster',
                hideTextOnBillboard: true,
                isComingSoon: false
            },
            'mk1': {
                title: 'Mortal Kombat 1',
                videoUrl: 'https://archive.org/download/mortal-kombat-bluray-1080p/Mortal%20Kombat%20%282021%29.mp4',
                billboardPosterUrl: 'https://4kwallpapers.com/images/wallpapers/mortal-kombat-2021-movies-poster-4096x1895-4902.jpg',
                libraryPosterUrl: 'https://i.ebayimg.com/images/g/rocAAOSwojRgMJBx/s-l400.jpg',
                logoUrl: 'https://logos-world.net/wp-content/uploads/2020/11/Mortal-Kombat-Logo.png',
                description: 'MMA fighter Cole Young seeks out Earth\'s greatest champions in order to stand against the enemies of Outworld in a high stakes battle for the universe.',
                themeStyle: 'fiery-orange',
                hideTextOnBillboard: false,
                isComingSoon: false
            },
            'bfg': {
                title: 'The BFG',
                videoUrl: 'https://archive.org/download/index_20260516/The.BFG.2016.720p.WEBRip.x264.AAC-ETRG.mp4',
                billboardPosterUrl: 'https://wallpapers.com/images/hd/the-bfg-movie-alo8v739htwfsxit.jpg',
                libraryPosterUrl: 'https://m.media-amazon.com/images/I/71naZ-Kfl4L._AC_UF894,1000_QL80_.jpg',
                logoUrl: '', 
                description: 'An orphan girl named Sophie befriends a benevolent giant, dubbed the Big Friendly Giant, who delivers charming dreams to children.',
                themeStyle: 'cold-steel',
                hideTextOnBillboard: true,
                isComingSoon: false
            }
        };

        const seriesDatabase = {
            'squidgame': {
                title: 'Squid Game',
                isSeries: true,
                seasonLabel: 'Season 1',
                billboardPosterUrl: 'https://images.ctfassets.net/4cd45et68cgf/3BJQrujAXLeXXsWXnolmvB/28845a87ecb25a0609c2e9faec57736c/EN_SQdGame_Main_PlayGround_Horizontal_RGB_PRE.jpg?w=1200',
                libraryPosterUrl: 'https://wallpapercave.com/wp/wp15116736.webp',
                logoUrl: 'https://upload.wikimedia.org/wikipedia/commons/5/57/Squid_Game_2021_vector_logo_english.svg?utm_source=commons.wikimedia.org&utm_campaign=index&utm_content=original', 
                description: 'Hundreds of cash-strapped players accept a strange invitation to compete in children\'s games. Inside, a tempting prize awaits with deadly high stakes. A survival game where only one walks away.',
                themeStyle: 'squid-magenta',
                hideTextOnBillboard: true,
                isComingSoon: false,
                episodes: [
                    { name: 'Red Light, Green Light', url: 'https://archive.org/download/squid.-game.-s-01-e-01.-dubbed.-webrip.x-264-ion-10eztv.re/Squid.Game.S01E01.DUBBED.WEBRip.x264-ION10%5Beztv.re%5D.mp4' },
                    { name: 'Hell', url: '#' },
                    { name: 'The Man with the Umbrella', url: '#' },
                    { name: 'Stick to the Team', url: '#' },
                    { name: 'A Fair World', url: '#' },
                    { name: 'Gganbu', url: '#' },
                    { name: 'VIPs', url: '#' },
                    { name: 'Front Man', url: '#' },
                    { name: 'One Lucky Day', url: '#' }
                ]
            }
        };

        // UI Element Selectors
        const billboard = document.getElementById('hero-billboard');
        const heroTitle = document.getElementById('hero-title');
        const heroLogoImg = document.getElementById('hero-logo-img');
        const heroDesc = document.getElementById('hero-desc');
        const heroPlayBtn = document.getElementById('hero-play-btn');
        const libraryGrid = document.getElementById('library-grid');
        const shelfHeading = document.getElementById('shelf-heading');
        const contentContainerView = document.getElementById('library-content-view');
        
        // Pop-out Overlay Window System Selectors
        const detailOverlay = document.getElementById('detail-overlay');
        const detailModalBox = document.getElementById('detail-modal-box');
        const tabPlayer = document.getElementById('tab-video-player');
        const tabImagePlaceholder = document.getElementById('tab-image-placeholder');
        const modalLogo = document.getElementById('modal-logo');
        const modalTitle = document.getElementById('modal-title');
        const modalSeasonTag = document.getElementById('modal-season-tag');
        const modalDesc = document.getElementById('modal-desc');
        const modalEpisodesSection = document.getElementById('modal-episodes-section');
        const episodesGrid = document.getElementById('episodes-grid');

        // ==========================================
        // DYNAMIC BANNER SELECTION MECHANICS
        // ==========================================
        function setupBillboardBanner(id, scope) {
            const db = (scope === 'movies') ? moviesDatabase : seriesDatabase;
            const data = db[id];
            if (!data) return;

            billboard.style.backgroundImage = `url('${data.billboardPosterUrl}')`;
            
            // Clean styles reset
            heroTitle.className = '';
            heroPlayBtn.className = 'apple-glass-btn btn-play';
            
            // Layout typography context toggles
            if (data.themeStyle === 'fiery-orange') {
                heroTitle.classList.add('fiery-orange-title');
                heroPlayBtn.classList.add('fiery-glow');
            } else if (data.themeStyle === 'electric-blue') {
                heroTitle.classList.add('blue-goat-title');
                heroPlayBtn.classList.add('neon-blue-glow');
            } else if (data.themeStyle === 'regal-gold') {
                heroTitle.classList.add('regal-gold-title');
            } else if (data.themeStyle === 'squid-magenta') {
                heroPlayBtn.classList.add('squid-magenta-glow');
            }

            // Hidden Title logic for asset designs
            if (data.hideTextOnBillboard && data.logoUrl) {
                heroTitle.style.display = 'none';
                heroLogoImg.src = data.logoUrl;
                heroLogoImg.style.display = 'block';
            } else {
                heroTitle.textContent = data.title;
                heroTitle.style.display = 'block';
                heroLogoImg.style.display = 'none';
            }

            heroDesc.textContent = data.description;

            // Handle unreleased state buttons
            if (data.isComingSoon) {
                heroPlayBtn.innerHTML = '<span>⏳ Coming Soon</span>';
                heroPlayBtn.classList.add('coming-soon-btn');
                heroPlayBtn.onclick = null;
            } else {
                heroPlayBtn.innerHTML = '<span style="font-size:1.2rem;">►</span> Watch Now';
                heroPlayBtn.onclick = () => launchMovieTab(id, scope);
            }
        }

        // ==========================================
        // GRID DATA POPULATION RENDERER
        // ==========================================
        function buildMediaLibraryGrid(scope) {
            libraryGrid.innerHTML = '';
            const db = (scope === 'movies') ? moviesDatabase : seriesDatabase;

            Object.keys(db).forEach(key => {
                const item = db[key];
                
                const card = document.createElement('div');
                card.className = 'movie-card';
                if (item.themeStyle === 'squid-magenta') card.classList.add('squid-hover');
                if (item.themeStyle === 'regal-gold') card.classList.add('gold-flare-hover');

                let badgeHtml = '';
                if (item.isComingSoon) {
                    badgeHtml = `<div class="card-badge badge-gold">May 2026</div>`;
                } else if (item.isSeries) {
                    badgeHtml = `<div class="card-badge badge-magenta">Full Season</div>`;
                }

                let overlayLogoHtml = '';
                if (item.hideTextOnBillboard && item.logoUrl) {
                    overlayLogoHtml = `<img class="card-logo-overlay" src="${item.logoUrl}" alt="logo">`;
                }

                card.innerHTML = `
                    <div class="poster-container">
                        ${badgeHtml}
                        <img class="poster-art" src="${item.libraryPosterUrl}" alt="${item.title}">
                        ${overlayLogoHtml}
                    </div>
                    <div class="movie-card-title">${item.hideTextOnBillboard && item.logoUrl ? '' : item.title}</div>
                `;

                card.onclick = () => launchMovieTab(key, scope);
                libraryGrid.appendChild(card);
            });
        }

        // ==========================================
        // TAB SWITCH CONTROLLER ENGINE
        // ==========================================
        function switchLibraryTab(scope) {
            if (currentTabScope === scope) return;
            currentTabScope = scope;

            // Handle tab selector visuals
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const clickedBtn = document.getElementById(`tab-${scope}`);
            clickedBtn.classList.add('active');

            // Slide capsule pill animation
            const activePill = document.getElementById('active-pill');
            activePill.style.transform = `translateX(${clickedBtn.offsetLeft - 4}px)`;
            activePill.style.width = `${clickedBtn.offsetWidth}px`;

            // Crossfade content views smoothly
            contentContainerView.classList.add('fade-out');
            
            setTimeout(() => {
                shelfHeading.textContent = (scope === 'movies') ? 'Your Movies' : 'Your Series';
                const defaultId = (scope === 'movies') ? 'goat' : 'squidgame';
                
                setupBillboardBanner(defaultId, scope);
                buildMediaLibraryGrid(scope);
                
                contentContainerView.classList.remove('fade-out');
            }, 300);
        }

        // ==========================================
        // IMMERSIVE DETAILED OVERLAY PLAYBACK CORE
        // ==========================================
        function launchMovieTab(id, scope) {
            const db = (scope === 'movies') ? moviesDatabase : seriesDatabase;
            const data = db[id];
            if (!data) return;

            // Reset custom overlay shapes
            detailModalBox.className = 'detail-modal glass-panel';
            modalTitle.className = '';

            // Assign unique design accent outlines
            if (data.themeStyle === 'regal-gold') {
                detailModalBox.classList.add('gold-modal-glow');
                modalTitle.classList.add('gold-title');
            } else if (data.themeStyle === 'squid-magenta') {
                detailModalBox.classList.add('squid-modal-glow');
                modalTitle.classList.add('squid-title');
            } else if (data.themeStyle === 'electric-blue') {
                modalTitle.classList.add('blue-title');
            } else if (data.themeStyle === 'fiery-orange') {
                modalTitle.classList.add('fiery-title');
            } else if (data.themeStyle === 'cold-steel') {
                modalTitle.classList.add('cold-title');
            }

            modalTitle.textContent = data.title;
            modalDesc.textContent = data.description;

            // Setup display assets (Logo vs standard headers)
            if (data.logoUrl) {
                modalLogo.src = data.logoUrl;
                modalLogo.style.display = 'block';
            } else {
                modalLogo.style.display = 'none';
            }

            // Handle coming soon image state vs interactive player streams
            if (data.isComingSoon) {
                tabPlayer.style.display = 'none';
                tabPlayer.pause();
                tabImagePlaceholder.src = data.billboardPosterUrl;
                tabImagePlaceholder.style.display = 'block';
                modalLogo.style.display = 'none';
            } else {
                tabImagePlaceholder.style.display = 'none';
                tabPlayer.style.display = 'block';
            }

            // Setup standard Movie track vs Serialized structural breakdowns
            if (data.isSeries) {
                modalSeasonTag.textContent = data.seasonLabel || 'Season 1';
                modalSeasonTag.style.display = 'block';
                modalEpisodesSection.style.display = 'block';
                
                // Build dynamic episode selector element nodes
                episodesGrid.innerHTML = '';
                data.episodes.forEach((ep, index) => {
                    const epCard = document.createElement('div');
                    epCard.className = `episode-card ${index === 0 ? 'active-episode' : ''}`;
                    epCard.id = `ep-card-${index}`;
                    
                    epCard.innerHTML = `
                        <div class="ep-header">
                            <span class="ep-number">Episode ${index + 1}</span>
                        </div>
                        <div class="ep-title">${ep.name}</div>
                        <button class="apple-glass-btn ep-btn-play" onclick="changeEpisodeTrack('${id}', ${index})">
                            ▶ Play Episode
                        </button>
                    `;
                    episodesGrid.appendChild(epCard);
                });

                // Instantly source video tag to initial stream context
                currentActiveEpisodeIndex = 0;
                if (!data.isComingSoon) {
                    tabPlayer.src = data.episodes[0].url;
                }
            } else {
                modalSeasonTag.style.display = 'none';
                modalEpisodesSection.style.display = 'none';
                if (!data.isComingSoon) {
                    tabPlayer.src = data.videoUrl;
                }
            }

            // Animate overlay display
            detailOverlay.style.display = 'block';
            setTimeout(() => {
                detailOverlay.style.opacity = '1';
            }, 10);
        }

        function changeEpisodeTrack(seriesId, targetIndex) {
            const data = seriesDatabase[seriesId];
            if (!data || !data.episodes[targetIndex]) return;

            document.querySelectorAll('.episode-card').forEach(c => c.classList.remove('active-episode'));
            document.getElementById(`ep-card-${targetIndex}`).classList.add('active-episode');

            currentActiveEpisodeIndex = targetIndex;
            tabPlayer.src = data.episodes[targetIndex].url;
            tabPlayer.play();
        }

        function closeMovieTab() {
            detailOverlay.style.opacity = '0';
            tabPlayer.pause();
            setTimeout(() => {
                detailOverlay.style.display = 'none';
                tabPlayer.src = '';
            }, 400);
        }

        // Escape Key Listener to exit overlay panel safely
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeMovieTab();
        });

        // Initialize App Interface Engine Defaults on Boot
        window.addEventListener('DOMContentLoaded', () => {
            setupBillboardBanner('goat', 'movies');
            buildMediaLibraryGrid('movies');
            
            // Match the capsule pill width to default active element natively
            const defaultBtn = document.getElementById('tab-movies');
            const activePill = document.getElementById('active-pill');
            activePill.style.width = `${defaultBtn.offsetWidth}px`;
        });
    </script>
</body>
</html>
